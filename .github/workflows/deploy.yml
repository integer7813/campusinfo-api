name: Laptop Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 핵심: sudo env 방식을 사용하여 보안 정책을 우회하고 토큰을 주입합니다.
      - name: Deploy with Docker Compose
        env:
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
        run: |
          # sudo env "VAR=$VAR" 형식은 sudo 환경에서도 변수를 유지시켜 줍니다.
          sudo env "TUNNEL_TOKEN=$TUNNEL_TOKEN" docker compose up -d --build

      - name: Cleanup Unused Images
        run: |
          sudo docker image prune -f

      - name: Show Running Containers
        run: |
          echo "===== RUNNING CONTAINERS ====="
          sudo docker ps -a