name: Laptop Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 핵심: 도커 컴포즈를 이용해 빌드와 실행을 동시에 진행합니다.
      # --build 옵션이 있어서 소스 변경 시 이미지를 새로 만들고, 
      # 네트워크(appnet) 설정대로 터널과 다시 묶어줍니다.
      - name: Deploy with Docker Compose
        run: |
          sudo docker compose up -d --build

      - name: Cleanup Unused Images
        run: |
          sudo docker image prune -f

      - name: Show Running Containers
        run: |
          echo "===== RUNNING CONTAINERS ====="
          sudo docker ps -a