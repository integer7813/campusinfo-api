name: Laptop Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 핵심: 깃허브 시크릿에 저장된 토큰을 가져와서 도커 실행 시 주입합니다.
      - name: Deploy with Docker Compose
        env:
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
        run: |
          # sudo를 쓸 때 환경변수가 사라지지 않도록 명시적으로 넘겨줍니다.
          sudo TUNNEL_TOKEN=$TUNNEL_TOKEN docker compose up -d --build

      - name: Cleanup Unused Images
        run: |
          sudo docker image prune -f

      - name: Show Running Containers
        run: |
          echo "===== RUNNING CONTAINERS ====="
          sudo docker ps -a